name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install numpy torch pyarrow pytest
      - name: Test
        run: pytest -q
      - name: Smoke (CLI plugins + pipeline)
        run: |
          python -m signalmap.cli plugins
          python -m signalmap.cli run --source sim --sink stdout --limit 5
