name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (editable package + test deps)
        run: |
          python -m pip install --upgrade pip
          pip install -e . pyarrow pytest
      - name: Test
        run: pytest -q
      - name: Smoke (installed entry point)
        run: |
          signalmap plugins
          signalmap run --source sim --sink stdout --limit 5
